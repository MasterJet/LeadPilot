services:
  db:
    image: mysql:8.0
    container_name: leadpilot_db
    restart: always
    environment:
      MYSQL_DATABASE: leadpilot
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:alpine
    container_name: leadpilot_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: leadpilot_backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://root:root@db/leadpilot
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: ./backend
    container_name: leadpilot_worker
    command: celery -A core.worker.celery worker --loglevel=info -Q scraper,analyzer,celery
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=mysql+pymysql://root:root@db/leadpilot
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build: ./frontend
    container_name: leadpilot_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  db_data:
